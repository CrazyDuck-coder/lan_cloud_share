{% extends "base.html" %}
{% block content %}
<div class="page-head"><div><h2>{{theme.menus.backup}}</h2><p>备份和恢复系统数据、配置与权限。</p></div><div class="head-actions"><form method="post" action="/backup/create"><button class="btn primary">创建备份</button></form><button class="btn ghost" data-modal="modalRestore">恢复备份</button></div></div>
<div class="table-card"><table><tr><th>备份文件</th><th>大小</th><th class="right">操作</th></tr>{% for b in backups %}<tr><td>{{b.name}}</td><td>{{b.stat().st_size}}</td><td class="right"><div class="row-actions"><button class="icon-btn" data-menu="bkMenu{{loop.index}}" type="button">⋯</button><div id="bkMenu{{loop.index}}" class="menu-pop row-menu"><a href="/backup/download/{{b.name}}">下载</a><button type="button" data-modal="delBk{{loop.index}}" class="danger-text">删除</button></div></div><div id="delBk{{loop.index}}" class="modal"><div class="modal-card modal-sm"><div class="modal-head"><b>删除备份</b><button type="button" class="modal-x" data-close>×</button></div><p>确定删除 {{b.name}}？</p><form method="post" action="/backup/delete"><input type="hidden" name="name" value="{{b.name}}"><div class="modal-foot"><button type="button" class="btn ghost" data-close>取消</button><button class="btn danger">删除</button></div></form></div></div></td></tr>{% endfor %}</table></div>
<div id="modalRestore" class="modal"><div class="modal-card modal-sm"><div class="modal-head"><b>恢复备份</b><button type="button" class="modal-x" data-close>×</button></div><form method="post" action="/backup/restore" enctype="multipart/form-data" class="form-grid"><label>备份文件<input type="file" name="file" data-file-list="restoreFileList"></label><div id="restoreFileList" class="file-list"></div><div class="modal-foot"><button type="button" class="btn ghost" data-close>取消</button><button class="btn primary">恢复</button></div></form></div></div>
{% endblock %}
